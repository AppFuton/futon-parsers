name: Comprehensive Parser Health Check

on:
    schedule:
        # Runs at 00:00 every Sunday
        -   cron: '0 0 * * 0'
    workflow_dispatch:
        inputs:
            timeout:
                description: 'HTTP request timeout in seconds'
                required: false
                default: '5'
            include_domains:
                description: 'Also check domain availability'
                required: false
                type: boolean
                default: true

permissions:
    contents: write
    pull-requests: write

jobs:
    parser-health-check:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

            -   name: Set up environment 🔧
                uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Set up Gradle 📦
                uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

            -   name: Compile all parsers 🚀
                run: ./gradlew compileKotlin
                continue-on-error: true

            -   name: Extract and validate parser metadata 📊
                run: |
                    #!/bin/bash
                    PARSER_DIR="src/main/kotlin/io/github/landwarderer/futon/parsers/site"
                    REPORT_FILE="parser_health_report.txt"

                    echo "========== PARSER HEALTH REPORT ==========" > "$REPORT_FILE"
                    echo "Generated: $(date)" >> "$REPORT_FILE"
                    echo "" >> "$REPORT_FILE"

                    if [ -d "$PARSER_DIR" ]; then
                      TOTAL_PARSERS=$(find "$PARSER_DIR" -name "*.kt" -type f | wc -l)
                      echo "📈 Total Parser Files: $TOTAL_PARSERS" >> "$REPORT_FILE"
                      echo "" >> "$REPORT_FILE"

                      echo "📁 Parsers by Template:" >> "$REPORT_FILE"
                      for template_dir in "$PARSER_DIR"/*/; do
                        template=$(basename "$template_dir")
                        count=$(find "$template_dir" -name "*.kt" -type f | wc -l)
                        printf "  %-20s %4d parsers\n" "$template" "$count" >> "$REPORT_FILE"
                      done | sort -k2 -rn >> "$REPORT_FILE"
                      echo "" >> "$REPORT_FILE"
                    else
                      echo "❌ Error: Parser directory not found at $PARSER_DIR" >> "$REPORT_FILE"
                    fi

                    cat "$REPORT_FILE"

            -   name: Check Health and Annotate/Restore 🛠️
                if: ${{ github.event_name == 'schedule' || inputs.include_domains }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    #!/bin/bash
                    PARSER_DIR="src/main/kotlin/io/github/landwarderer/futon/parsers/site"
                    TIMEOUT="${{ inputs.timeout || '5' }}"
                    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                    IMPORT_STMT="import io.github.landwarderer.futon.parsers.Broken"
                    DOMAIN_REPORT="domain_health_report.txt"

                    echo "========== DOMAIN HEALTH REPORT ==========" > "$DOMAIN_REPORT"
                    echo "Generated: $(date)" >> "$DOMAIN_REPORT"
                    echo "" >> "$DOMAIN_REPORT"

                    if [ -d "$PARSER_DIR" ]; then
                      find "$PARSER_DIR" -name "*.kt" -type f | while read -r file; do
                        domain=$(grep -oP 'Domain\("\K[^"]+' "$file" | head -1)
                        [[ -z "$domain" || "$domain" == "localhost" ]] && continue

                        url="$domain"
                        [[ ! "$url" =~ ^https?:// ]] && url="https://$url"

                        status=$(curl -s -o /dev/null -w "%{http_code}" --max-time "$TIMEOUT" -L "$url" || echo "000")

                        if [[ "$status" =~ ^5 || "$status" == "000" ]]; then
                          if ! grep -q "@Broken" "$file"; then
                            echo "✗ $domain - $status (Marking Broken)" >> "$DOMAIN_REPORT"
                            if ! grep -q "$IMPORT_STMT" "$file"; then
                              sed -i "/package /a \\$IMPORT_STMT" "$file"
                            fi
                            REASON="Server Error $status observed by health check"
                            ANNOTATION="@Broken(reason = \"$REASON\", lastCheck = \"$TIMESTAMP\")"
                            sed -i "/class /i $ANNOTATION" "$file"
                            echo "MODIFIED=true" >> $GITHUB_ENV
                          fi
                        elif [[ "$status" =~ ^2 ]] && grep -q "@Broken" "$file"; then
                            echo "✓ $domain - $status (Restoring Live Parser)" >> "$DOMAIN_REPORT"
                            sed -i '/@Broken/d' "$file"
                            if ! grep -q "@Broken" "$file"; then
                              sed -i "\|$IMPORT_STMT|d" "$file"
                            fi
                            echo "MODIFIED=true" >> $GITHUB_ENV
                        fi
                      done
                    fi

            -   name: Create Pull Request 🚀
                if: env.MODIFIED == 'true'
                uses: peter-evans/create-pull-request@v6
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
                    commit-message: "chore: update parser health status"
                    branch: fix/auto-parser-health-${{ github.run_id }}
                    title: "🤖 Automated Health Check: Sync Parser Status"
                    body: "Marked/Unmarked parsers based on weekly domain availability check."
                    labels: automated-pr, health-check

            -   name: Generate combined report 📝
                if: always()
                run: |
                    touch combined_report.txt
                    [ -f parser_health_report.txt ] && cat parser_health_report.txt > combined_report.txt
                    echo "" >> combined_report.txt
                    [ -f domain_health_report.txt ] && cat domain_health_report.txt >> combined_report.txt

            -   name: Upload reports 📤
                uses: actions/upload-artifact@v4
                if: always()
                with:
                    name: parser-health-reports
                    path: |
                        parser_health_report.txt
                        domain_health_report.txt
                        combined_report.txt
                    retention-days: 30

            -   name: Comment on workflow run 💬
                if: always()
                run: |
                    echo "## 🏥 Parser Health Check Complete" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY

                    if [ -f parser_health_report.txt ]; then
                      echo "### Summary" >> $GITHUB_STEP_SUMMARY
                      head -25 parser_health_report.txt >> $GITHUB_STEP_SUMMARY
                    else
                      echo "⚠️ Parser health report was not generated." >> $GITHUB_STEP_SUMMARY
                    fi

                    echo "" >> $GITHUB_STEP_SUMMARY

                    if [ -f domain_health_report.txt ]; then
                      echo "### Status Changes" >> $GITHUB_STEP_SUMMARY
                      echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
                      grep -E "✗|Restoring" domain_health_report.txt | head -20 >> $GITHUB_STEP_SUMMARY || echo "No status changes detected." >> $GITHUB_STEP_SUMMARY
                      echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                    fi

                    [ "${{ env.MODIFIED }}" == "true" ] && echo "✅ **A Pull Request has been created.**" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "📊 [Full reports available in artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
